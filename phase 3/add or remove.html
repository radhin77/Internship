<!DOCTYPE html>
<html>
<body>
  <input type="button" value="Add" onclick="add()">
  <input type="button" value="Remove" onclick="remove()">





  <script>
    var a=document.createElement("h1");

    function add(){
      a.innerHTML="JavaScript"
      document.body.appendChild(a);

    }

    function remove(){
      a.remove();
    }


  </script>

</body>
</html>
