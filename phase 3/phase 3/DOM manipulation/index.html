<!DOCTYPE html>
<html>
<head>
    <title>JavaScript - DOM Manipulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>DOM Manipulation</h1>

<div class="box">
    <h2>Dynamic List</h2>
    <input id="listInput" placeholder="Type list">
    <button id="add">Add</button>
    <button id="clear1">Clear</button>
    <p id="msg1"></p>
    <ul id="list"></ul>
</div>

<div class="box">
    <h2>To-Do</h2>
    <input id="todoInput" placeholder="Type task">
    <button id="task">Add</button>
    <button id="clear2">Clear</button>
    <p id="msg2"></p>
    <ul id="todo"></ul>
</div>

<div class="box">
    <h2>Toggle</h2>
    <button id="toggle">OFF</button>
</div>

<script src="script.js"></script>

</body>
</html>
